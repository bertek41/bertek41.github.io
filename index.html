    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #5f6368;
      --link: #0b6cff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --fg: #e8e8e8;
        --muted: #9aa0a6;
        --link: #6ea8ff;
      }
    }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p { color: var(--muted); margin: 0 0 24px; }
    ul { padding: 0; margin: 0; list-style: none; }
    li { padding: 12px 0; border-top: 1px solid color-mix(in srgb, var(--muted) 25%, transparent); }
    a { color: var(--link); text-decoration: none; }
    a:hover, a:focus { text-decoration: underline; }
  </style>
